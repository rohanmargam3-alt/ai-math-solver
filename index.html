<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧮 Math Solver Bot</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}

.container {
    max-width:900px;
    margin:auto;
}

h1 {
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.chat {
    background:white;
    height:500px;
    overflow-y:auto;
    padding:20px;
    border-radius:15px;
}

.msg {
    padding:12px 18px;
    margin:10px 0;
    border-radius:20px;
    max-width:80%;
}

.user {
    background:#4f46e5;
    color:white;
    margin-left:auto;
}

.bot {
    background:#f1f5f9;
}

.input-box {
    display:flex;
    gap:10px;
    margin-top:15px;
}

input {
    flex:1;
    padding:12px;
    border-radius:20px;
    border:2px solid #ddd;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:20px;
    background:#10b981;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#059669;
}
</style>
</head>

<body>

<div class="container">
<h1>🧮 Math Solver Bot</h1>

<div id="chat" class="chat">
<div class="msg bot">
Hi! Try:<br>
2+2<br>
solve x+3=7<br>
solve 2x+4=10<br>
derivative(x^2)
</div>
</div>

<div class="input-box">
<input id="input" placeholder="Type a math problem...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ✅ FIXED EQUATION SOLVER
function solveEquation(input) {
    try {
        let eq = input.toLowerCase().replace("solve", "").trim();

        if (!eq.includes("=")) return "❌ Invalid equation";

        let [left, right] = eq.split("=");

        // Convert to standard form
        let expr = math.simplify(`(${left}) - (${right})`).toString();

        // Match ax + b
        let match = expr.match(/([+-]?\d*\.?\d*)\*?x([+-]\d+\.?\d*)?/);

        if (match) {
            let a = match[1];

            if (a === "" || a === "+") a = 1;
            else if (a === "-") a = -1;
            else a = parseFloat(a);

            let b = match[2] ? parseFloat(match[2]) : 0;

            if (a === 0) return "❌ No solution";

            let x = -b / a;
            return "✅ x = " + x;
        }

        return "❌ Unsupported equation";

    } catch {
        return "❌ Error solving equation";
    }
}

// 🤖 BOT RESPONSE
function botReply(text) {
    let clean = text.toLowerCase().trim();

    // Derivative
    if (clean.includes("derivative")) {
        try {
            let expr = clean
                .replace("derivative", "")
                .replace(/[()]/g, "")
                .trim();

            let result = math.derivative(expr, "x").toString();
            return "📘 Derivative: " + result;
        } catch {
            return "❌ Invalid derivative input";
        }
    }

    // Solve equation
    if (clean.startsWith("solve")) {
        return solveEquation(text);
    }

    // Normal math
    try {
        let result = math.evaluate(text);
        return "✅ " + text + " = " + result;
    } catch {
        return "🤔 Try: 2+2, solve x+3=7, derivative(x^2)";
    }
}

// SEND MESSAGE
function send() {
    let text = input.value.trim();
    if (!text) return;

    add(text, "user");
    input.value = "";

    setTimeout(() => {
        add(botReply(text), "bot");
    }, 400);
}

// ENTER KEY
input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
